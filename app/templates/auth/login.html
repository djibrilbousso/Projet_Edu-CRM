<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion – Edu.CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f0f2f7;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .login-card {
      background: white; border-radius: 20px;
      padding: 2.5rem; width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
    .logo-icon {
      width: 42px; height: 42px; background: #4f35e8;
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 22px; height: 22px; fill: white; }
    .logo-text { font-size: 20px; font-weight: 800; color: #111827; letter-spacing: -0.5px; }

    h2 { font-size: 22px; font-weight: 800; color: #111827; margin-bottom: 4px; letter-spacing: -0.3px; }
    .sub { font-size: 14px; color: #6b7280; margin-bottom: 1.75rem; }

    .alert { padding: 10px 14px; border-radius: 10px; margin-bottom: 1rem; font-size: 13.5px; font-weight: 500; }
    .alert-danger  { background: #fee2e2; color: #991b1b; }
    .alert-success { background: #dcfce7; color: #166534; }
    .alert-warning { background: #fef9c3; color: #854d0e; }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 13px; font-weight: 600; color: #111827; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.15s; color: #111827;
    }
    input:focus { border-color: #4f35e8; box-shadow: 0 0 0 3px rgba(79,53,232,0.08); }
    input::placeholder { color: #9ca3af; }

    .btn-login {
      width: 100%; padding: 12px; background: #4f35e8; color: white;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      font-family: inherit; cursor: pointer; margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-login:hover { background: #3d28c8; transform: translateY(-1px); }

    .hint { text-align: center; margin-top: 1.25rem; font-size: 13px; color: #9ca3af; }
    .hint strong { color: #6b7280; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm-7 9.25V16l7 3.75L19 16v-3.75L12 16l-7-3.75z"/>
      </svg>
    </div>
    <span class="logo-text">Edu.CRM</span>
  </div>

  <h2>Bon retour 👋</h2>
  <p class="sub">Connectez-vous pour accéder à votre espace</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.login') }}">
    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" name="username" placeholder="Ex : mame" autofocus required>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-login">Se connecter</button>
  </form>

  <p class="hint">Compte test : <strong>mame</strong> / <strong>mame123</strong></p>
</div>
</body>
</html>
