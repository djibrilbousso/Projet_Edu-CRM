{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    
                    <p class="text-muted small">Connectez-vous pour accéder à votre espace</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">
                            <i class="bi bi-person me-1"></i>Nom d'utilisateur
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Ex : admin" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">
                            <i class="bi bi-lock me-1"></i>Mot de passe
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="....." required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">
                        Compte test : <strong>admin</strong> / <strong>admin123</strong>
                    </small>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
